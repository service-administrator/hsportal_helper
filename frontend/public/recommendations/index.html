<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>추천 결과 | 비교과 프로그램 도우미</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%230067b1"/><text x="32" y="39" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="white">HSP</text></svg>' />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="site-shell results-shell">
      <header class="site-header">
        <a class="brand" href="/">
          <span class="brand-mark">HSP</span>
          <span>
            <strong>비교과 프로그램 도우미</strong>
            <small>hsportal ai helper</small>
          </span>
        </a>
        <nav class="header-actions">
          <a class="outline-button" href="/timetable/">시간표 수정</a>
          <a class="primary-button link-button" href="/">새로 시작</a>
        </nav>
      </header>

      <div class="step-layout results-content-layout">
        <section class="results-hero">
        <div>
          <p class="eyebrow">Step 3</p>
          <h1>추천 비교과 프로그램</h1>
          <p>
            공강 시간에 참여할 수 있는 비교과 프로그램 목록입니다. 항목을 클릭하면 상세 정보가 표시됩니다.
          </p>
        </div>
        <aside class="result-summary-panel">
          <div class="result-summary-chips" aria-label="추천 결과 요약">
            <span class="summary-chip available">가능 <strong id="availableCount">0</strong></span>
            <span class="summary-chip needs-review">확인 <strong id="needsReviewCount">0</strong></span>
            <span class="summary-chip unavailable">불가 <strong id="unavailableCount">0</strong></span>
          </div>
        </aside>
      </section>

        <section class="results-layout">
        <section class="ranking-panel" aria-label="추천 프로그램 순위">
          <div class="ranking-head">
            <div class="ranking-title">
              <strong>추천 목록</strong>
              <span id="shownCount">전체 0개</span>
            </div>
            <div class="ranking-controls">
              <input id="searchInput" type="search" placeholder="프로그램 검색" />
              <select id="filterSelect" aria-label="추천 결과 필터">
                <option value="all">전체</option>
                <option value="available">참여 가능</option>
                <option value="needs_review">확인 필요</option>
                <option value="unavailable">참여 불가</option>
              </select>
            </div>
          </div>
          <div class="ranking-list" id="rankingList"></div>
        </section>
        </section>
      </div>
    </main>

    <div class="modal-backdrop" id="programModal" hidden>
      <article class="app-modal program-modal" id="programDetail" aria-label="프로그램 상세 정보">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Program detail</p>
            <h2>프로그램 상세</h2>
          </div>
          <button class="icon-button" type="button" id="closeProgramButton" aria-label="닫기">×</button>
        </div>
        <div id="programDetailBody"></div>
      </article>
    </div>

    <script src="/recommendations/app.js"></script>
  </body>
</html>
