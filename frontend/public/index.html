<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>비교과 프로그램 추천 서비스</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">HS Portal Helper</p>
        <h1>비교과 프로그램 추천 서비스</h1>
        <p class="description">
          시간표 이미지와 비교과 프로그램 포스터를 분석해 참여 가능한 프로그램을 추천하는
          기말과제 프로젝트입니다.
        </p>

        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="heartbeatText">서버 상태 확인 중...</span>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
