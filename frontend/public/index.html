<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>비교과 프로그램 추천 서비스</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">

      <header class="panel">
        <p class="eyebrow">HS Portal Helper</p>
        <h1>비교과 프로그램 추천 서비스</h1>
        <p class="description">
          시간표 이미지를 업로드하면 참여 가능한 비교과 프로그램을 추천해 드립니다.
        </p>
        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="heartbeatText">서버 상태 확인 중...</span>
        </div>
      </header>

      <section class="panel">
        <h2>시간표 업로드</h2>
        <p class="description">시간표 캡처 이미지를 선택하거나 끌어다 놓으십시오.</p>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*" hidden />
          <div class="upload-placeholder" id="uploadPlaceholder">
            <span class="upload-icon">📁</span>
            <p>이미지를 끌어다 놓거나 <button class="link-btn" id="browseBtn">파일 선택</button></p>
            <p class="upload-hint">JPG, PNG, WEBP 지원</p>
          </div>
          <div class="upload-preview hidden" id="uploadPreview">
            <img id="previewImg" src="" alt="시간표 미리보기" />
            <button class="link-btn remove-btn" id="removeBtn">제거</button>
          </div>
        </div>
        <button class="btn-primary" id="analyzeBtn" disabled>추천 받기</button>
      </section>

      <section class="panel hidden" id="resultSection">
        <h2>추천 결과</h2>
        <p class="description" id="resultMeta"></p>
        <ul class="program-list" id="programList"></ul>
      </section>

    </main>
    <script src="/app.js"></script>
  </body>
</html>
