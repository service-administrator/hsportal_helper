<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>시간표 추천 API 테스트</title>
    <link rel="stylesheet" href="/test/styles.css" />
  </head>
  <body>
    <main class="test-shell">
      <header class="test-header">
        <p class="eyebrow">Recommendation Test</p>
        <h1>시간표 기반 비교과 추천</h1>
      </header>

      <section class="workspace" aria-label="시간표 이미지 변환 테스트">
        <form class="upload-panel" id="uploadForm">
          <label class="file-drop" for="imageInput">
            <span class="file-title">시간표 이미지 선택</span>
            <span class="file-name" id="fileName">PNG, JPG, WEBP 파일을 업로드하세요.</span>
          </label>
          <input id="imageInput" name="file" type="file" accept="image/png,image/jpeg,image/webp" />

          <div class="preview-frame">
            <img id="previewImage" alt="업로드한 시간표 미리보기" hidden />
            <span id="previewPlaceholder">미리보기</span>
          </div>

          <button class="submit-button" type="submit" id="submitButton">JSON 변환</button>
          <p class="status-text" id="statusText">대기 중</p>
        </form>

        <section class="result-panel" aria-label="변환 결과">
          <div class="result-toolbar">
            <h2>시간표 JSON</h2>
            <div class="button-row">
              <button class="copy-button" type="button" id="sampleButton">샘플</button>
              <button class="copy-button" type="button" id="copyButton">복사</button>
            </div>
          </div>
          <textarea id="resultOutput" spellcheck="false">{
  "courses": [],
  "warnings": []
}</textarea>
        </section>
      </section>

      <section class="recommend-panel" aria-label="비교과 추천 테스트">
        <div class="recommend-toolbar">
          <div>
            <h2>추천 결과</h2>
            <p class="panel-note">시간표 JSON을 기준으로 참여 가능, 일정 확인 필요, 참여 불가를 분류합니다.</p>
          </div>
          <button class="submit-button recommend-button" type="button" id="recommendButton">
            추천 실행
          </button>
        </div>
        <div class="recommend-summary" id="recommendSummary">
          <span>available 0</span>
          <span>needs_review 0</span>
          <span>unavailable 0</span>
        </div>
        <div class="recommend-list" id="recommendList">
          <p class="empty-state">추천 실행을 기다리는 중입니다.</p>
        </div>
      </section>
    </main>

    <script src="/test/app.js"></script>
  </body>
</html>
